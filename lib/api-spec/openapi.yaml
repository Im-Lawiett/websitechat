openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: GlobalChat API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile and management
  - name: groups
    description: Group chat operations
  - name: messages
    description: Messaging operations
  - name: contacts
    description: Private chat contacts
  - name: uploads
    description: File upload operations
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Users ───────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile (creates if first-time)
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all registered users (for search / adding contacts)
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a specific user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ─── Groups ──────────────────────────────────────────────────────────────────
  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List all groups visible to the user
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupList"
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a new group (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupInput"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/{groupId}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get a specific group with member count
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
    patch:
      operationId: updateGroup
      tags: [groups]
      summary: Update a group (admin only)
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupUpdate"
      responses:
        "200":
          description: Updated group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete a group (admin only)
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /groups/{groupId}/join:
    post:
      operationId: joinGroup
      tags: [groups]
      summary: Join a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMember"

  /groups/{groupId}/leave:
    post:
      operationId: leaveGroup
      tags: [groups]
      summary: Leave a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Left group

  /groups/{groupId}/members:
    get:
      operationId: listGroupMembers
      tags: [groups]
      summary: List members of a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMemberList"

  # ─── Messages ─────────────────────────────────────────────────────────────────
  /groups/{groupId}/messages:
    get:
      operationId: listGroupMessages
      tags: [messages]
      summary: Fetch message history for a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
        - name: before
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageList"
    post:
      operationId: sendGroupMessage
      tags: [messages]
      summary: Send a message to a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /groups/{groupId}/messages/{messageId}:
    delete:
      operationId: deleteGroupMessage
      tags: [messages]
      summary: Delete a message (admin or own message)
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Private / DM messages ────────────────────────────────────────────────────
  /dm/{contactUserId}/messages:
    get:
      operationId: listDmMessages
      tags: [messages]
      summary: Get DM conversation with a contact
      parameters:
        - name: contactUserId
          in: path
          required: true
          schema:
            type: string
        - name: before
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: DM messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageList"
    post:
      operationId: sendDmMessage
      tags: [messages]
      summary: Send a direct message
      parameters:
        - name: contactUserId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Sent DM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  # ─── Contacts ─────────────────────────────────────────────────────────────────
  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List saved contacts for private chat
      responses:
        "200":
          description: Contacts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactList"
    post:
      operationId: addContact
      tags: [contacts]
      summary: Save a user as a contact to enable private chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Contact added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{contactUserId}:
    delete:
      operationId: removeContact
      tags: [contacts]
      summary: Remove a saved contact
      parameters:
        - name: contactUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  # ─── Uploads ──────────────────────────────────────────────────────────────────
  /uploads:
    post:
      operationId: uploadFile
      tags: [uploads]
      summary: Upload a file/image/document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileUploadRequest"
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"

  # ─── Admin ────────────────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Dashboard stats — total users, groups, messages, banned
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users with ban status (admin only)
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [all, active, banned]
            default: all
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Admin user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserList"

  /admin/users/{userId}/ban:
    post:
      operationId: banUser
      tags: [admin]
      summary: Ban a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanInput"
      responses:
        "200":
          description: Banned user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{userId}/unban:
    post:
      operationId: unbanUser
      tags: [admin]
      summary: Unban a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unbanned user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/messages/{messageId}:
    delete:
      operationId: adminDeleteMessage
      tags: [admin]
      summary: Admin force-delete any message
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/recent-activity:
    get:
      operationId: getAdminRecentActivity
      tags: [admin]
      summary: Recent join/ban/message activity feed for admin dashboard
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityList"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    User:
      type: object
      properties:
        id:
          type: string
        clerkId:
          type: string
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, admin]
        isBanned:
          type: boolean
        banReason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, clerkId, username, displayName, email, role, isBanned, createdAt]

    UserUpdate:
      type: object
      properties:
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string

    UserList:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
      required: [users, total]

    Group:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        isMember:
          type: boolean
      required: [id, name, memberCount, createdAt, isMember]

    GroupInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        avatarUrl:
          type: string
      required: [name]

    GroupUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        avatarUrl:
          type: string

    GroupList:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/Group"
      required: [groups]

    GroupMember:
      type: object
      properties:
        userId:
          type: string
        groupId:
          type: integer
        user:
          $ref: "#/components/schemas/User"
        joinedAt:
          type: string
          format: date-time
      required: [userId, groupId, user, joinedAt]

    GroupMemberList:
      type: object
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/GroupMember"
        total:
          type: integer
      required: [members, total]

    Message:
      type: object
      properties:
        id:
          type: integer
        content:
          type: ["string", "null"]
        fileUrl:
          type: ["string", "null"]
        fileType:
          type: ["string", "null"]
        fileName:
          type: ["string", "null"]
        messageType:
          type: string
          enum: [text, image, file, audio, video]
        senderId:
          type: string
        sender:
          $ref: "#/components/schemas/User"
        groupId:
          type: ["integer", "null"]
        recipientId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, messageType, senderId, sender, createdAt]

    MessageInput:
      type: object
      properties:
        content:
          type: string
        fileUrl:
          type: string
        fileType:
          type: string
        fileName:
          type: string
        messageType:
          type: string
          enum: [text, image, file, audio, video]
          default: text
      required: [messageType]

    MessageList:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        hasMore:
          type: boolean
      required: [messages, hasMore]

    Contact:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        contactUserId:
          type: string
        contact:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time
      required: [id, userId, contactUserId, contact, createdAt]

    ContactInput:
      type: object
      properties:
        contactUserId:
          type: string
      required: [contactUserId]

    ContactList:
      type: object
      properties:
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
      required: [contacts]

    FileUploadRequest:
      type: object
      properties:
        fileName:
          type: string
        fileType:
          type: string
        fileSize:
          type: integer
        fileData:
          type: string
          description: Base64 encoded file content
      required: [fileName, fileType, fileData]

    UploadResult:
      type: object
      properties:
        url:
          type: string
        fileType:
          type: string
        fileName:
          type: string
        fileSize:
          type: integer
      required: [url, fileType, fileName, fileSize]

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        bannedUsers:
          type: integer
        totalGroups:
          type: integer
        totalMessages:
          type: integer
        messagesToday:
          type: integer
        newUsersToday:
          type: integer
      required: [totalUsers, activeUsers, bannedUsers, totalGroups, totalMessages, messagesToday, newUsersToday]

    AdminUserList:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
      required: [users, total]

    BanInput:
      type: object
      properties:
        reason:
          type: string
      required: [reason]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [user_joined, user_banned, user_unbanned, group_created, message_deleted]
        description:
          type: string
        actorName:
          type: string
        targetName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, type, description, actorName, createdAt]

    ActivityList:
      type: object
      properties:
        activities:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
      required: [activities]
